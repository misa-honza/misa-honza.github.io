<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  body{margin:0;background:#eef3e8;font-family:Georgia,serif;color:#46562f}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{padding:34px 20px 26px;text-align:center;border:1px solid #d8e0cf}
  .lab{font-size:20px;letter-spacing:.04em;margin-bottom:14px;color:#5f7247}
  .pair{display:flex;align-items:flex-end;justify-content:center;gap:6px}
  svg{display:block}
  .mir{transform:scaleX(-1)}
</style></head><body>
<div class="grid">

  <!-- A: side-profile sitting cats facing each other, tails up forming a HEART -->
  <div class="cell"><div class="lab">A — tails make a heart</div>
    <div class="pair">
      <svg width="120" height="150" viewBox="0 0 120 150" fill="#8a9775" aria-label="A">
        <!-- right-facing cat on the LEFT, tail rises to center -->
        <g>
          <!-- seated body -->
          <path d="M30 142 C 18 142 12 132 14 118 C 16 96 20 78 34 74 C 50 70 60 84 60 104 C 60 124 56 142 44 142 Z"/>
          <!-- chest/front leg -->
          <path d="M44 142 C 44 120 46 104 50 96 C 55 100 56 120 56 142 Z"/>
          <!-- head -->
          <circle cx="46" cy="60" r="16"/>
          <!-- ears -->
          <path d="M33 50 L 28 32 L 46 46 Z"/>
          <path d="M59 50 L 64 32 L 46 46 Z"/>
          <!-- tail: from rear up and curving right to center, forming left lobe of heart -->
          <path d="M22 96 C 6 86 8 50 34 40 C 58 32 70 14 60 4 C 70 18 58 36 40 44 C 22 52 20 80 30 92 Z"/>
        </g>
      </svg>
      <svg class="mir" width="120" height="150" viewBox="0 0 120 150" fill="#8a9775">
        <g>
          <path d="M30 142 C 18 142 12 132 14 118 C 16 96 20 78 34 74 C 50 70 60 84 60 104 C 60 124 56 142 44 142 Z"/>
          <path d="M44 142 C 44 120 46 104 50 96 C 55 100 56 120 56 142 Z"/>
          <circle cx="46" cy="60" r="16"/>
          <path d="M33 50 L 28 32 L 46 46 Z"/>
          <path d="M59 50 L 64 32 L 46 46 Z"/>
          <path d="M22 96 C 6 86 8 50 34 40 C 58 32 70 14 60 4 C 70 18 58 36 40 44 C 22 52 20 80 30 92 Z"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- B: side-profile sitting cats facing each other, classic tail curled at front -->
  <div class="cell"><div class="lab">B — facing pair (side profile)</div>
    <div class="pair">
      <svg width="120" height="140" viewBox="0 0 120 140" fill="#8a9775">
        <g>
          <!-- back/haunch -->
          <path d="M22 130 C 10 130 8 116 12 96 C 16 72 26 56 44 56 C 62 56 70 74 70 100 C 70 118 66 130 54 130 Z"/>
          <!-- head -->
          <circle cx="62" cy="44" r="16"/>
          <!-- ears -->
          <path d="M50 34 L 46 16 L 64 30 Z"/>
          <path d="M76 34 L 80 16 L 62 30 Z"/>
          <!-- chest filler -->
          <path d="M52 60 C 52 48 72 48 70 70 C 68 86 60 92 54 90 Z"/>
          <!-- front legs -->
          <path d="M58 96 L 58 130 L 68 130 L 67 96 Z"/>
          <!-- tail curling along the front to the right -->
          <path d="M70 116 C 90 120 96 100 86 92 C 92 102 82 110 70 108 Z"/>
        </g>
      </svg>
      <svg class="mir" width="120" height="140" viewBox="0 0 120 140" fill="#8a9775">
        <g>
          <path d="M22 130 C 10 130 8 116 12 96 C 16 72 26 56 44 56 C 62 56 70 74 70 100 C 70 118 66 130 54 130 Z"/>
          <circle cx="62" cy="44" r="16"/>
          <path d="M50 34 L 46 16 L 64 30 Z"/>
          <path d="M76 34 L 80 16 L 62 30 Z"/>
          <path d="M52 60 C 52 48 72 48 70 70 C 68 86 60 92 54 90 Z"/>
          <path d="M58 96 L 58 130 L 68 130 L 67 96 Z"/>
          <path d="M70 116 C 90 120 96 100 86 92 C 92 102 82 110 70 108 Z"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- C: from behind, improved (rounder, fluffier tails out) -->
  <div class="cell"><div class="lab">C — from behind, tails out</div>
    <div class="pair">
      <svg class="mir" width="116" height="140" viewBox="0 0 116 140" fill="#8a9775">
        <g>
          <!-- ears -->
          <path d="M40 26 L 31 2 L 56 20 Z"/>
          <path d="M72 26 L 81 2 L 56 20 Z"/>
          <!-- rounded back -->
          <path d="M56 16 C 38 16 28 34 27 56 C 21 72 21 102 25 118 C 27 130 40 136 56 136 C 72 136 85 130 87 118 C 91 102 91 72 85 56 C 84 34 74 16 56 16 Z"/>
          <!-- back paws -->
          <ellipse cx="44" cy="134" rx="9" ry="6"/>
          <ellipse cx="68" cy="134" rx="9" ry="6"/>
          <!-- fluffy tail out to the side -->
          <path d="M86 112 C 110 116 116 86 100 74 C 110 90 98 106 84 104 Z"/>
        </g>
      </svg>
      <svg width="116" height="140" viewBox="0 0 116 140" fill="#8a9775">
        <g>
          <path d="M40 26 L 31 2 L 56 20 Z"/>
          <path d="M72 26 L 81 2 L 56 20 Z"/>
          <path d="M56 16 C 38 16 28 34 27 56 C 21 72 21 102 25 118 C 27 130 40 136 56 136 C 72 136 85 130 87 118 C 91 102 91 72 85 56 C 84 34 74 16 56 16 Z"/>
          <ellipse cx="44" cy="134" rx="9" ry="6"/>
          <ellipse cx="68" cy="134" rx="9" ry="6"/>
          <path d="M86 112 C 110 116 116 86 100 74 C 110 90 98 106 84 104 Z"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- D: minimalist line-art sitting cats facing each other -->
  <div class="cell"><div class="lab">D — line-art pair</div>
    <div class="pair">
      <svg width="110" height="140" viewBox="0 0 110 140" fill="none" stroke="#8a9775" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M40 128 C 24 128 20 104 26 78 C 30 60 40 50 56 52 C 50 40 52 26 58 24 C 60 32 62 40 66 44 C 74 40 84 44 84 54 C 84 66 78 74 70 76 C 80 92 82 110 76 128"/>
        <path d="M70 110 C 92 112 96 92 86 86"/>
      </svg>
      <svg class="mir" width="110" height="140" viewBox="0 0 110 140" fill="none" stroke="#8a9775" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M40 128 C 24 128 20 104 26 78 C 30 60 40 50 56 52 C 50 40 52 26 58 24 C 60 32 62 40 66 44 C 74 40 84 44 84 54 C 84 66 78 74 70 76 C 80 92 82 110 76 128"/>
        <path d="M70 110 C 92 112 96 92 86 86"/>
      </svg>
    </div>
  </div>

</div>
</body></html>
